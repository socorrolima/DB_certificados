<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Emissão de Certificados — SNAS/MDS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
  .header { background: #003580; color: #fff; padding: 18px 32px; }
  .card { border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); border: none; }
  #preview-wrap { border: 2px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #eee; }
  #canvas-cert { width: 100%; height: auto; display: block; }
</style>
</head>
<body>

<div class="header d-flex align-items-center gap-3">
  <div>
    <div class="fw-bold" style="font-size:1.2rem">🏛️ SNAS / MDS</div>
    <div style="font-size:.82rem;opacity:.82">Secretaria Nacional de Assistência Social</div>
  </div>
  <span class="badge ms-auto" style="background:#1a7a3c;font-size:.8rem">GOV.BR</span>
</div>

<div class="container py-4" style="max-width:800px">

  <div class="card p-4 mb-4">
    <h5 class="fw-bold text-primary mb-1">📄 Emissão de Certificado</h5>
    <p class="text-muted small mb-4">Digite seu nome completo e selecione o evento para gerar seu certificado.</p>

    <div class="mb-3">
      <label class="form-label fw-semibold">Nome completo</label>
      <input type="text" id="inp-nome" class="form-control"
             placeholder="Ex: João Silva"
             onkeydown="if(event.key==='Enter') buscar()"/>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Evento</label>
      <select id="sel-evento" class="form-select">
        <option value="">Carregando eventos...</option>
      </select>
    </div>

    <button class="btn btn-primary w-100 fw-bold py-2" onclick="buscar()">
      🎓 Gerar Certificado
    </button>
    <div id="msg" class="mt-3" style="display:none"></div>
  </div>

  <div class="card p-4" id="area-preview" style="display:none">
    <h5 class="fw-bold text-primary mb-3">🖼️ Pré-visualização</h5>
    <div id="preview-wrap"><canvas id="canvas-cert"></canvas></div>
    <div id="qr-wrap" class="text-center mt-3" style="display:none">
      <p class="small text-muted mb-1">QR Code de validação</p>
      <div id="qr"></div>
    </div>
    <div class="d-flex gap-2 mt-3 flex-wrap">
      <button class="btn btn-success fw-bold" onclick="baixarPDF()">⬇️ Baixar PDF</button>
      <button class="btn btn-outline-primary fw-bold" onclick="limpar()">🔄 Nova consulta</button>
    </div>
    <div id="cert-codigo" class="mt-2 text-muted small"></div>
  </div>

</div>

<script>
// ── Configuração Supabase ──────────────────────────
const SUPA_URL = 'https://bwmrtdqmscvwlzhuhaax.supabase.co';
const SUPA_KEY = 'sb_publishable_HcURuILAWFshK0RyjIB7LQ_iDgqHzv5';

async function supabase(tabela, opts = {}) {
  const { method = 'GET', filtros = '', body = null, select = '*' } = opts;
  const url = `${SUPA_URL}/rest/v1/${tabela}?select=${select}${filtros}`;
  const res = await fetch(url, {
    method,
    headers: {
      'apikey':        SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type':  'application/json',
      'Prefer':        method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

// ── Normaliza string (remove acentos, caixa, espaços) ──
function normalizar(t) {
  if (!t) return '';
  return t.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

// ── Similaridade entre dois nomes ──────────────────
function similaridade(a, b) {
  a = normalizar(a); b = normalizar(b);
  if (a === b) return 1.0;
  if (a.includes(b) || b.includes(a)) return 0.9;
  const pa = new Set(a.split(' ')), pb = new Set(b.split(' '));
  const comuns = [...pa].filter(x => pb.has(x));
  return comuns.length / Math.max(pa.size, pb.size);
}

let dadosCert = null;

// ── Carrega eventos ativos ─────────────────────────
async function carregarEventos() {
  try {
    const evs = await supabase('eventos', { filtros: '&status=eq.ativo&order=nome_evento' });
    const sel = document.getElementById('sel-evento');
    sel.innerHTML = '<option value="">— Selecione o evento —</option>';
    evs.forEach(ev => {
      sel.innerHTML += `<option value="${ev.id}">${ev.nome_evento} — ${ev.cidade}</option>`;
    });
  } catch(e) {
    document.getElementById('sel-evento').innerHTML = '<option>Erro ao carregar eventos</option>';
  }
}

// ── Busca participante e gera certificado ──────────
async function buscar() {
  const nome = document.getElementById('inp-nome').value.trim();
  const eid  = document.getElementById('sel-evento').value;
  if (!nome) { msg('⚠️ Digite seu nome completo.', 'warning'); return; }
  if (!eid)  { msg('⚠️ Selecione um evento.', 'warning'); return; }

  msg('⏳ Buscando...', 'info');
  try {
    // Busca evento
    const evArr = await supabase('eventos', { filtros: `&id=eq.${eid}` });
    const evento = evArr[0];
    if (!evento) { msg('❌ Evento não encontrado.', 'danger'); return; }

    // Busca participantes do evento
    const parts = await supabase('participantes', { filtros: `&evento_id=eq.${eid}` });
    if (!parts.length) { msg('❌ Evento sem participantes cadastrados.', 'danger'); return; }

    // Busca exata
    const nb  = normalizar(nome);
    let enc = parts.find(p => normalizar(p.nome) === nb);

    // Busca aproximada
    if (!enc) {
      let best = null, score = 0;
      parts.forEach(p => {
        const s = similaridade(nome, p.nome);
        if (s > score) { score = s; best = p; }
      });
      if (score >= 0.85) enc = best;
    }

    if (!enc) {
      msg('❌ Nome não encontrado. Verifique a grafia ou contate a organização.', 'danger');
      document.getElementById('area-preview').style.display = 'none';
      return;
    }

    // Verifica se já tem certificado
    let certArr = await supabase('certificados', {
      filtros: `&participante_id=eq.${enc.id}&evento_id=eq.${eid}`
    });
    let cert = certArr[0];

    if (!cert) {
      // Gera código e hash únicos
      const total  = await supabase('certificados', { select: 'id', filtros: '' });
      const ano    = new Date().getFullYear();
      const codigo = `CERT-${ano}-${String(total.length + 1).padStart(6, '0')}`;
      const hash   = await gerarHash(`${enc.id}-${eid}-${Date.now()}`);

      const novos = await supabase('certificados', {
        method: 'POST',
        body:   { participante_id: enc.id, evento_id: eid, codigo, hash_validacao: hash }
      });
      cert = novos[0];
    }

    // Preenche texto com placeholders
    const texto = preencherTexto(evento.texto_certificado, {
      Nome:          enc.nome,
      Municipio:     enc.municipio || '',
      Cidade:        evento.cidade,
      Data:          evento.periodo,
      Carga_Horaria: evento.carga_horaria,
    });

    dadosCert = { ...enc, evento, texto, cert };
    msg('✅ Participante encontrado!', 'success');
    await renderizar(evento, texto, cert);

  } catch(e) {
    console.error(e);
    msg('❌ Erro: ' + e.message, 'danger');
  }
}

// ── Preenche placeholders {Nome} etc ──────────────
function preencherTexto(tmpl, dados) {
  let t = tmpl;
  Object.entries(dados).forEach(([k, v]) => {
    t = t.replaceAll(`{${k}}`, v || '');
  });
  return t;
}

// ── Hash SHA-256 ───────────────────────────────────
async function gerarHash(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Renderiza certificado no canvas ───────────────
async function renderizar(evento, texto, cert) {
  const canvas = document.getElementById('canvas-cert');
  const ctx    = canvas.getContext('2d');

  // Carrega template (base64 salvo no Supabase) ou demo
  let tmpl;
  if (evento.template_base64) {
    tmpl = await loadImg(evento.template_base64);
  } else {
    tmpl = await demoImg();
  }

  const W = tmpl.naturalWidth;
  const H = tmpl.naturalHeight;
  canvas.width = W; canvas.height = H;

  // Fundo + template
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(tmpl, 0, 0, W, H);

  // Texto principal
  const linhas  = texto.split('\n').filter(l => l.trim());
  const szTexto = Math.round(W * 0.022);
  const lhTexto = szTexto * 1.6;
  const yInicio = H * 0.40;

  ctx.save();
  ctx.font         = `bold ${szTexto}px Arial, sans-serif`;
  ctx.fillStyle    = '#1a1a1a';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur   = 6;
  linhas.forEach((l, i) => ctx.fillText(l, W / 2, yInicio + i * lhTexto));
  ctx.restore();

  // Assinatura
  const yA = H * 0.72;
  ctx.save();
  ctx.strokeStyle = '#333'; ctx.lineWidth = Math.round(W * 0.001);
  ctx.beginPath();
  ctx.moveTo(W/2 - W*0.18, yA); ctx.lineTo(W/2 + W*0.18, yA);
  ctx.stroke(); ctx.restore();

  const szA = Math.round(W * 0.017);
  ctx.save();
  ctx.font = `bold ${szA}px Arial`; ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 4;
  ctx.fillText('Elias de Souza Oliveira', W/2, yA + szA * 1.2);
  ctx.restore();

  const szC = Math.round(W * 0.013);
  const yC  = yA + szA * 3;
  ctx.save();
  ctx.font = `${szC}px Arial`; ctx.fillStyle = '#333';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 3;
  ctx.fillText('Diretor de Departamento de Proteção Social Básica', W/2, yC);
  ctx.fillText('da Secretaria Nacional de Assistência Social', W/2, yC + szC * 1.6);
  ctx.restore();

  // Exibe
  document.getElementById('area-preview').style.display = 'block';
  document.getElementById('area-preview').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('cert-codigo').innerHTML = `Código: <strong>${cert.codigo}</strong>`;

  // QR Code
  const qw = document.getElementById('qr-wrap');
  qw.style.display = 'block';
  document.getElementById('qr').innerHTML = '';
  new QRCode(document.getElementById('qr'), {
    text: window.location.origin + '/validar.html?c=' + cert.hash_validacao,
    width: 120, height: 120
  });

  msg('✅ Certificado gerado para: ' + (dadosCert?.nome || ''), 'success');
}

function loadImg(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload  = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

async function demoImg() {
  const W = 2480, H = 1754;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#eef2ff'); g.addColorStop(1,'#dbeafe');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#003580'; ctx.lineWidth=28; ctx.strokeRect(36,36,W-72,H-72);
  ctx.strokeStyle='#1a56db'; ctx.lineWidth=8; ctx.strokeRect(66,66,W-132,H-132);
  ctx.fillStyle='#003580'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='bold 72px Arial'; ctx.fillText('MINISTÉRIO DO DESENVOLVIMENTO E ASSISTÊNCIA SOCIAL',W/2,140);
  ctx.font='bold 150px Georgia,serif'; ctx.fillText('CERTIFICADO',W/2,360);
  ctx.fillStyle='#1a56db'; ctx.fillRect(280,560,W-560,6);
  ctx.fillStyle='#003580'; ctx.fillRect(W/2-320,H-220,640,4);
  ctx.font='44px Arial'; ctx.fillStyle='#6b7280'; ctx.fillText('Brasília — 2026',W/2,H-160);
  const img = new Image();
  img.src = c.toDataURL('image/png');
  return new Promise(res => { img.onload = () => res(img); });
}

function baixarPDF() {
  if (!dadosCert) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  doc.addImage(document.getElementById('canvas-cert').toDataURL('image/png',1.0),'PNG',0,0,297,210);
  doc.save('Certificado_' + dadosCert.nome.replace(/\s+/g,'_') + '.pdf');
}

function msg(txt, tipo) {
  const el = document.getElementById('msg');
  el.className = 'alert alert-' + tipo + ' py-2 small';
  el.textContent = txt; el.style.display = 'block';
}

function limpar() {
  document.getElementById('inp-nome').value = '';
  document.getElementById('sel-evento').value = '';
  document.getElementById('area-preview').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  dadosCert = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

carregarEventos();
</script>
</body>
</html>
